<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting DEMAT Account - UPVEST</title>
    <link rel="stylesheet" href="../core/variables.css">
    <link rel="stylesheet" href="../core/global.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: var(--font-primary);
        }
        .callback-container {
            text-align: center;
            background: white;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .status {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .status.success {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success-color);
        }
        .status.error {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger-color);
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner" id="spinner"></div>
        <h1 id="statusTitle">Connecting Your DEMAT Account...</h1>
        <p id="statusMessage">Please wait while we securely connect your account.</p>
        <div id="statusBadge"></div>
    </div>

    <script src="../core/config.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/navigation.js"></script>
    <script src="../core/api.js"></script>
    <script src="demat-service.js"></script>
    <script>
        // Handle OAuth callback
        document.addEventListener('DOMContentLoaded', async () => {
            const spinner = document.getElementById('spinner');
            const statusTitle = document.getElementById('statusTitle');
            const statusMessage = document.getElementById('statusMessage');
            const statusBadge = document.getElementById('statusBadge');

            try {
                // Process the callback
                const success = await DematService.handleCallback();

                if (success) {
                    spinner.style.display = 'none';
                    statusTitle.textContent = '✅ Account Connected Successfully!';
                    statusMessage.textContent = 'Redirecting you to dashboard...';
                    statusBadge.innerHTML = '<div class="status success">Connection Successful</div>';
                } else {
                    throw new Error('Connection failed');
                }
            } catch (error) {
                spinner.style.display = 'none';
                statusTitle.textContent = '❌ Connection Failed';
                statusMessage.textContent = 'Unable to connect your DEMAT account. Please try again.';
                statusBadge.innerHTML = '<div class="status error">Connection Failed</div>';

                // Redirect back after 3 seconds
                setTimeout(() => {
                    window.location.href = '../home/dashboard.html';
                }, 3000);
            }
        });
    </script>
</body>
</html>
