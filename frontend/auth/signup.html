<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - UPVEST</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../core/variables.css">
    <link rel="stylesheet" href="../core/global.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="auth-wrapper">
        <!-- Back to Home Link -->
        <a href="../index.html" class="back-home">
            ← Back to Home
        </a>

        <!-- Signup Card -->
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo-text">UPVEST</div>
                <div class="auth-logo-tagline">AI-Powered Investment Platform</div>
            </div>

            <!-- Title -->
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Start your investment journey today</p>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form" novalidate>
                <!-- Full Name Field -->
                <div class="form-group has-icon">
                    <label for="signupName" class="form-label">Full Name</label>
                    <div style="position: relative;">
                        <span class="input-icon">👤</span>
                        <input type="text" id="signupName" name="name" class="form-input"
                            placeholder="Enter your full name" required autocomplete="name">
                    </div>
                </div>

                <!-- Email Field -->
                <div class="form-group has-icon">
                    <label for="signupEmail" class="form-label">Email Address</label>
                    <div style="position: relative;">
                        <span class="input-icon">📧</span>
                        <input type="email" id="signupEmail" name="email" class="form-input"
                            placeholder="Enter your email" required autocomplete="email">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group has-icon">
                    <label for="signupPassword" class="form-label">Password</label>
                    <div style="position: relative;">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="signupPassword" name="password" class="form-input"
                            placeholder="Create a strong password" required autocomplete="new-password">
                        <button type="button" class="password-toggle" tabindex="-1">👁️</button>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div id="passwordStrength" class="password-strength">
                        <div class="password-strength-bar"></div>
                    </div>
                    <div class="password-strength-text"></div>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group has-icon">
                    <label for="signupConfirmPassword" class="form-label">Confirm Password</label>
                    <div style="position: relative;">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="signupConfirmPassword" name="confirmPassword" class="form-input"
                            placeholder="Re-enter your password" required autocomplete="new-password">
                        <button type="button" class="password-toggle" tabindex="-1">👁️</button>
                    </div>
                </div>

                <!-- Terms & Conditions -->
                <div class="form-group">
                    <label class="remember-me" style="margin-bottom: 16px;">
                        <input type="checkbox" id="agreeTerms" required>
                        <span style="font-size: 13px; color: var(--text-secondary);">
                            I agree to the <a href="#" style="color: var(--primary-color);">Terms of Service</a>
                            and <a href="#" style="color: var(--primary-color);">Privacy Policy</a>
                        </span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="auth-submit-btn">
                    Create My Account
                </button>
            </form>

            <!-- Switch to Login -->
            <div class="auth-switch">
                Already have an account?
                <a href="login.html" class="auth-switch-link">Login here</a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../core/config.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/navigation.js"></script>
    <script src="../core/api.js"></script>
    <script src="auth.js"></script>
</body>

</html>
