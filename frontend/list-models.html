<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Available Models</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a202c;
            color: #e2e8f0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        button {
            padding: 12px 24px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #6d28d9;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #2d3748;
            border-radius: 8px;
            white-space: pre-wrap;
            max-height: 600px;
            overflow-y: auto;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }
        .warning { color: #f59e0b; }
        .model-item {
            background: #1a202c;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border-left: 3px solid #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 List Available Gemini Models</h1>
        <p>This will show you which models your API key can access.</p>
        
        <div>
            <button onclick="listModels()">List All Models</button>
            <button onclick="clearResult()">Clear</button>
        </div>

        <div id="result"></div>
    </div>

    <script src="core/config.js"></script>
    <script>
        const resultDiv = document.getElementById('result');

        function log(message, type = 'info') {
            const span = document.createElement('span');
            span.className = type;
            span.textContent = message + '\n';
            resultDiv.appendChild(span);
            console.log(message);
        }

        function clearResult() {
            resultDiv.innerHTML = '';
        }

        async function listModels() {
            clearResult();
            log('🔍 Listing available models with your API key...', 'info');
            log('─'.repeat(70), 'info');
            
            // Check if config exists
            if (typeof CONFIG === 'undefined') {
                log('❌ ERROR: CONFIG not loaded', 'error');
                return;
            }
            
            const apiKey = CONFIG?.API_KEYS?.GEMINI_API_KEY;
            if (!apiKey) {
                log('❌ ERROR: API key not found in CONFIG', 'error');
                return;
            }
            
            log(`✓ Using API Key: ${apiKey.substring(0, 20)}...`, 'success');
            log('─'.repeat(70), 'info');
            
            try {
                log('📤 Fetching model list from Google AI...', 'info');
                
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`,
                    {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    }
                );

                log(`📥 Response Status: ${response.status} ${response.statusText}`, 
                    response.ok ? 'success' : 'error');

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    log('❌ API Error:', 'error');
                    log(JSON.stringify(errorData, null, 2), 'error');
                    
                    if (response.status === 403) {
                        log('\n💡 TIP: 403 = API key invalid or doesn\'t have permission', 'warning');
                        log('   → Create a new API key at: https://aistudio.google.com/app/apikey', 'warning');
                    }
                    return;
                }

                const data = await response.json();
                
                if (!data.models || data.models.length === 0) {
                    log('⚠️ No models found for this API key', 'warning');
                    return;
                }

                log(`✅ SUCCESS! Found ${data.models.length} available models:`, 'success');
                log('─'.repeat(70), 'info');
                
                // Filter for generateContent models
                const generateModels = data.models.filter(model => 
                    model.supportedGenerationMethods?.includes('generateContent')
                );

                log(`\n📊 Models that support generateContent (${generateModels.length}):`, 'info');
                log('─'.repeat(70), 'info');

                generateModels.forEach((model, index) => {
                    const modelDiv = document.createElement('div');
                    modelDiv.className = 'model-item';
                    
                    const modelName = model.name.replace('models/', '');
                    const displayName = model.displayName || modelName;
                    const description = model.description || 'No description';
                    
                    modelDiv.innerHTML = `
                        <div style="color: #10b981; font-weight: bold; font-size: 16px;">
                            ${index + 1}. ${modelName}
                        </div>
                        <div style="color: #94a3b8; margin-top: 4px;">
                            Display Name: ${displayName}
                        </div>
                        <div style="color: #cbd5e1; margin-top: 4px; font-size: 14px;">
                            ${description}
                        </div>
                        <div style="color: #64748b; margin-top: 8px; font-size: 12px;">
                            Methods: ${model.supportedGenerationMethods.join(', ')}
                        </div>
                    `;
                    
                    resultDiv.appendChild(modelDiv);
                    
                    console.log(`${index + 1}. ${modelName}`);
                    console.log(`   Display: ${displayName}`);
                    console.log(`   Description: ${description}`);
                    console.log(`   Methods: ${model.supportedGenerationMethods.join(', ')}`);
                    console.log('');
                });

                log('─'.repeat(70), 'info');
                log('\n💡 RECOMMENDATION:', 'warning');
                
                // Check if gemini-1.5-flash is available
                const hasFlash = generateModels.some(m => m.name.includes('gemini-1.5-flash'));
                const hasPro = generateModels.some(m => m.name.includes('gemini-1.5-pro'));
                const hasExp = generateModels.some(m => m.name.includes('gemini-2.0-flash-exp'));
                
                if (hasFlash) {
                    log('✅ You CAN use: gemini-1.5-flash', 'success');
                    log('   This is strange - model exists but test failed.', 'warning');
                    log('   Try creating a NEW API key.', 'warning');
                } else if (hasExp) {
                    log('✅ Use: gemini-2.0-flash-exp (newer experimental model)', 'success');
                    log('   Your key has access to this but not 1.5-flash', 'info');
                } else if (hasPro) {
                    log('✅ Use: gemini-1.5-pro', 'success');
                } else {
                    log('❌ No modern models available with this key', 'error');
                    log('   → CREATE A NEW API KEY at: https://aistudio.google.com/app/apikey', 'warning');
                }

                log('\n📝 Full API Response:', 'info');
                log(JSON.stringify(data, null, 2), 'info');

            } catch (error) {
                log('❌ ERROR:', 'error');
                log(error.toString(), 'error');
                
                if (error.message.includes('Failed to fetch')) {
                    log('\n💡 TIP: Network error - check internet connection', 'warning');
                }
            }
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            log('Ready! Click "List All Models" to check available models.', 'info');
            log('─'.repeat(70), 'info');
        });
    </script>
</body>
</html>
